<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexHaus &ndash; Ihr Rechts-Kompass f&uuml;r den Hauskauf in Italien | Studio Legale Golini</title>
  <meta name="description" content="Immobilie in Italien kaufen? LexHaus zeigt Ihnen alle Nebenkosten, Steuern und rechtlichen Fallstricke. Kostenrechner, Checklisten und Praxisleitfaden &ndash; kostenlos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#001431;--white:#fff;--gray:#6b7280;--font-h:'Playfair Display',Georgia,serif;--font-b:'Cinzel',Georgia,serif}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);color:var(--white);line-height:1.7;background:var(--navy)}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;height:auto;display:block}
    .container{max-width:1100px;margin:0 auto;padding:0 20px}

    .nav{background:var(--navy);padding:14px 0;position:relative;z-index:100}
    .nav .container{display:flex;align-items:center;justify-content:space-between}
    .nav-logo{height:60px}
    .nav-links{display:flex;list-style:none;gap:20px}
    .nav-links a{color:var(--white);font-size:0.78rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;transition:opacity 0.2s}
    .nav-links a:hover{opacity:0.7}
    .nav-toggle{display:none;background:none;border:none;color:var(--white);font-size:2rem;cursor:pointer;z-index:300;position:relative;padding:8px}
    @media(max-width:1024px){
      .nav-links{display:none!important;flex-direction:column;position:absolute;top:80px;right:20px;left:auto;background:rgba(0,20,49,0.95);padding:16px 24px;gap:12px;z-index:200;text-align:right;align-items:flex-end;border-radius:8px;backdrop-filter:blur(8px)}
      .nav-links.active{display:flex!important}
      .nav-toggle{display:block}
    }

    .hero{background:url('hero-v3.png') center center/cover no-repeat;background-color:var(--navy);padding:120px 0 80px;text-align:center;position:relative}
    .hero::before{content:'';position:absolute;inset:0;background:rgba(0,20,49,0.75)}
    .hero *{position:relative;z-index:1}
    .hero h1{font-family:var(--font-h);font-size:2.8rem;margin-bottom:20px;font-weight:700}
    .hero h1 span{color:rgba(184,164,114,0.9)}
    .hero p{font-size:0.9rem;color:rgba(255,255,255,0.7);max-width:650px;margin:0 auto 16px;line-height:1.8}
    .hero .sub{font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:36px}
    .btn{display:inline-block;padding:16px 40px;border-radius:50px;font-weight:600;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s;cursor:pointer}
    .btn-main{background:var(--white);color:var(--navy);border:none}
    .btn-main:hover{background:rgba(255,255,255,0.9)}
    .btn-outline{color:var(--white);background:transparent;border:2px solid var(--white)}
    .btn-outline:hover{background:var(--white);color:var(--navy)}

    .section{padding:80px 0}
    .section-title{font-family:var(--font-h);font-size:2rem;text-align:center;margin-bottom:12px;color:var(--white)}
    .section-subtitle{text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase;max-width:700px;margin:0 auto 50px}

    .features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .feature-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:32px 24px;text-align:center}
    .feature-card .icon{width:56px;height:56px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .feature-card .icon svg{width:24px;height:24px;stroke:var(--white);fill:none;stroke-width:1.5}
    .feature-card h3{font-family:var(--font-h);font-size:1.05rem;margin-bottom:10px;color:var(--white)}
    .feature-card p{font-size:0.8rem;color:rgba(255,255,255,0.6);letter-spacing:0.5px;text-transform:uppercase;line-height:1.7}

    .fehler-section{border-top:1px solid rgba(255,255,255,0.1);padding:80px 0}
    .fehler-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:800px;margin:40px auto 0}
    .fehler-item{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;display:flex;gap:16px;align-items:start}
    .fehler-num{font-family:var(--font-h);font-size:1.8rem;color:rgba(255,255,255,0.2);font-weight:700;flex-shrink:0;width:40px}
    .fehler-item h3{font-family:var(--font-h);font-size:0.95rem;color:var(--white);margin-bottom:6px}
    .fehler-item p{font-size:0.75rem;color:rgba(255,255,255,0.5);line-height:1.7}

    .cta-section{text-align:center;padding:80px 0;border-top:1px solid rgba(255,255,255,0.1)}
    .cta-section h2{font-family:var(--font-h);font-size:2rem;margin-bottom:16px}
    .cta-section p{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:32px;max-width:600px;margin-left:auto;margin-right:auto}

    .footer-section{background:var(--navy);color:var(--white);padding:60px 0 40px}
    .footer-grid{display:grid;grid-template-columns:1fr 2fr;gap:40px;align-items:start}
    .footer-logo{height:60px;width:auto;margin-bottom:20px}
    .footer-contact-item{display:flex;gap:10px;margin-bottom:14px;font-size:0.85rem;align-items:flex-start}
    .footer-contact-item svg{width:18px;height:18px;min-width:18px;margin-top:2px;color:var(--white)}
    .footer-contact-label{font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:0.8rem}
    .footer-map h3{font-family:var(--font-h);font-size:1.3rem;margin-bottom:16px;font-style:italic}
    .footer-map iframe{width:100%;height:300px;border:none;border-radius:8px}
    .footer-bottom{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)}
    .footer-bottom a{color:rgba(255,255,255,0.5);margin:0 8px;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px}
    .footer-social{display:flex;justify-content:center;gap:16px;margin-top:12px}
    .footer-social a{color:rgba(255,255,255,0.5);transition:color 0.2s}
    .footer-social a:hover{color:var(--white)}

    @media(max-width:768px){
      .hero h1{font-size:1.8rem}
      .features-grid{grid-template-columns:1fr}
      .fehler-grid{grid-template-columns:1fr}
      .footer-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="container">
    <a href="/"><img src="/img/logo-nav.svg" alt="Studio Legale Golini" class="nav-logo"></a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">&#9776;</button>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/zwangsversteigerungen/">Zwangsversteigerungen</a></li>
      <li><a href="/1-euro-haeuser/">1-Euro-H&auml;user</a></li>
      <li><a href="/lexhaus/">LexHaus</a></li>
      <li><a href="/#kontakt">Kontakt</a></li>
    </ul>
  </div>
</nav>

<!-- TOOL -->
<iframe src="/lexhaus/app/#tools" style="width:100%;min-height:calc(100vh - 88px);border:none;display:block" id="lexhaus-frame"></iframe>
<script>
// Auto-resize iframe
window.addEventListener('message',function(e){if(e.data&&e.data.height){document.getElementById('lexhaus-frame').style.height=e.data.height+'px'}});
</script>

</body>
</html>
